<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" width="480" height="180">
  <g fill="#0FA3DB">
    <!-- Wordmark "Interact" lowercase -->
    <text x="0" y="130" font-family="'Open Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="140" letter-spacing="-3">Interact</text>
  </g>
  <!-- Rotary gear wheel mark -->
  <g transform="translate(330, 18) scale(0.62)">
    <!-- Outer gear teeth -->
    <g fill="#0FA3DB">
      <circle cx="120" cy="120" r="118"/>
    </g>
    <!-- Tooth notches: subtract small white blocks around perimeter -->
    <g fill="#ffffff">
      <!-- 24 notches every 15 degrees -->
      <g>
        <rect x="116" y="0" width="8" height="14" rx="1"/>
      </g>
      <g transform="rotate(15 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(30 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(45 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(60 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(75 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(90 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(105 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(120 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(135 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(150 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(165 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(180 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(195 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(210 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(225 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(240 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(255 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(270 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(285 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(300 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(315 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(330 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
      <g transform="rotate(345 120 120)"><rect x="116" y="0" width="8" height="14" rx="1"/></g>
    </g>
    <!-- Inner ring with text band -->
    <circle cx="120" cy="120" r="92" fill="#ffffff"/>
    <circle cx="120" cy="120" r="80" fill="#0FA3DB"/>
    <!-- ROTARY arched on top, INTERNATIONAL arched on bottom -->
    <defs>
      <path id="topArc" d="M 50 120 A 70 70 0 0 1 190 120" fill="none"/>
      <path id="botArc" d="M 50 120 A 70 70 0 0 0 190 120" fill="none"/>
    </defs>
    <text fill="#ffffff" font-family="'Open Sans',Arial,sans-serif" font-weight="800" font-size="18" letter-spacing="2.5">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">ROTARY</textPath>
    </text>
    <text fill="#ffffff" font-family="'Open Sans',Arial,sans-serif" font-weight="800" font-size="14" letter-spacing="2">
      <textPath href="#botArc" startOffset="50%" text-anchor="middle">INTERNATIONAL</textPath>
    </text>
    <!-- Inner gear circle -->
    <circle cx="120" cy="120" r="58" fill="#ffffff"/>
    <circle cx="120" cy="120" r="48" fill="#0FA3DB"/>
    <!-- 6 spokes radiating -->
    <g fill="#ffffff">
      <rect x="116" y="74" width="8" height="92"/>
      <g transform="rotate(60 120 120)"><rect x="116" y="74" width="8" height="92"/></g>
      <g transform="rotate(120 120 120)"><rect x="116" y="74" width="8" height="92"/></g>
    </g>
    <!-- Hub -->
    <circle cx="120" cy="120" r="14" fill="#ffffff"/>
    <circle cx="120" cy="120" r="9" fill="#0FA3DB"/>
    <circle cx="120" cy="120" r="4" fill="#ffffff"/>
  </g>
</svg>
